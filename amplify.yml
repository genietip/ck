version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - PORT=3000 BASE_PATH=/ pnpm --filter @workspace/cv-website run build
  artifacts:
    baseDirectory: artifacts/cv-website/dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - artifacts/cv-website/node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=0, must-revalidate'
    - pattern: 'assets/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
