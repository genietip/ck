kind = "web"
previewPath = "/"
title = "Chandrakanth Vallakati – CV Website"
version = "1.0.0"
id = "artifacts/cv-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18573

[services.development]
run = "pnpm --filter @workspace/cv-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cv-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/cv-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18573"
BASE_PATH = "/"
